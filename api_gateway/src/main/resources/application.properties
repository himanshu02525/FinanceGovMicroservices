spring.application.name=api-gateway
server.port=9091

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
 
# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

server.error.include-message=always
server.error.include-binding-errors=always
logging.level.org.springframework.web=DEBUG

# ===============================
# Spring Security Debug Logs
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.authorization=TRACE
logging.level.org.springframework.security.web.server=DEBUG

# ===============================
# Gateway Security Package (Your Code)
# ===============================
logging.level.com.finance.gateway.security=DEBUG





#spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
#spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true
 
# ===============================
# Budget Resource Service
# ===============================
spring.cloud.gateway.server.webflux.routes[0].id=budget-resource-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/budget/**,/api/resources/**
spring.cloud.gateway.server.webflux.routes[0].uri=lb://BUDGET-RESOURCE-SERVICE


 
 
# ===============================
# Financial Program Subsidy Service
# ===============================
spring.cloud.gateway.server.webflux.routes[1].id=financial-program-subsidy-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/programs/**,/applications/**,/subsidies/**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://FINANCIAL-PROGRAM-SUBSIDY-SERVICE
 
 
