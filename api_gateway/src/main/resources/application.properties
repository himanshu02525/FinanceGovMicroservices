spring.application.name=api-gateway
server.port=9091

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


# ===============================
# Budget Resource Service
# ===============================
spring.cloud.gateway.server.webflux.routes[0].id=budget-resource-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/budget/**
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Path=/api/resources/**
spring.cloud.gateway.server.webflux.routes[0].uri=lb://BUDGET-RESOURCE-SERVICE


# ===============================
# Financial Program Subsidy Service
# ===============================
spring.cloud.gateway.server.webflux.routes[1].id=financial-program-subsidy-service
