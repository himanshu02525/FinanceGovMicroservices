#please do not edit this file , tell TL to add something in this file
spring.application.name=api-gateway
server.port=9091
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always

# Eureka Client Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=budget-resource-service
spring.cloud.gateway.server.webflux.routes[0].predicates=Path=/api/budget/**,/api/resources/**
spring.cloud.gateway.server.webflux.routes[0].uri=lb://BUDGET-RESOURCE-SERVICE

spring.cloud.gateway.server.webflux.routes[1].id=financial-program-subsidy-service
spring.cloud.gateway.server.webflux.routes[1].predicates=Path=/api/programs/**,/api/applications/**,/api/subsidies/**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://FINANCIAL-PROGRAM-SUBSIDY-SERVICE

spring.cloud.gateway.server.webflux.routes[2].id=compliance-audit-service
spring.cloud.gateway.server.webflux.routes[2].predicates=Path=/compliance/**,/audit/**
spring.cloud.gateway.server.webflux.routes[2].uri=lb://COMPLIANCE-AUDIT-SERVICE
 
spring.cloud.gateway.server.webflux.routes[3].id=citizen-business-service
spring.cloud.gateway.server.webflux.routes[3].predicates=Path=/citizens/**,/business/**
spring.cloud.gateway.server.webflux.routes[3].uri=lb://CITIZEN-BUSINESS-SERVICE
 
spring.cloud.gateway.server.webflux.routes[4].id=report-generation-service
spring.cloud.gateway.server.webflux.routes[4].predicates=Path=/reports/**
spring.cloud.gateway.server.webflux.routes[4].uri=lb://REPORT-GENERATION-SERVICE

spring.cloud.gateway.server.webflux.routes[5].id=notification-service
spring.cloud.gateway.server.webflux.routes[5].predicates=Path=/api/notification/**
spring.cloud.gateway.server.webflux.routes[5].uri=lb://NOTIFICATION-SERVICE

spring.cloud.gateway.server.webflux.routes[6].id=taxation-disclosure-service
spring.cloud.gateway.server.webflux.routes[6].predicates=Path=/disclosure/**,/taxation/**
spring.cloud.gateway.server.webflux.routes[6].uri=lb://TAXATION-DISCLOSURE-SERVICE

spring.cloud.gateway.server.webflux.routes[7].id=identity-access-service
spring.cloud.gateway.server.webflux.routes[7].predicates=Path=/api/v1/audit/**,/api/auth/**,/api/users/**,/api/admin/**
spring.cloud.gateway.server.webflux.routes[7].uri=lb://IDENTITY-ACCESS-SERVICE



 


