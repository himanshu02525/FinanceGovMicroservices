spring.cloud.gateway.server.webflux.routes[1].predicates[1]=Path=/api/applications/**
spring.cloud.gateway.server.webflux.routes[1].predicates[2]=Path=/api/subsidies/**
spring.cloud.gateway.server.webflux.routes[1].uri=lb://FINANCIAL-PROGRAM-SUBSIDY-SERVICE


