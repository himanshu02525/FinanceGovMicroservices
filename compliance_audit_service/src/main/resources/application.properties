spring.application.name=compliance-audit-service
server.port=8086
spring.config.import=optional:configserver:http://localhost:8760

#please do not edit the above section 
#add your database passwords in your current file
spring.messages.basename=message

# =========================================================
# DATABASE CONFIG (MySQL)
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/complianceauditservice?createDatabaseIfNotExist=true

#Eureka properties are in the config server repository
#add your database passwords in your current file
spring.datasource.password=${DB_PASSWORD}


# ===============================
# FEIGN + RESILIENCE4J
# ===============================
feign.circuitbreaker.enabled=true

resilience4j.circuitbreaker.instances.entityService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.entityService.sliding-window-size=10
resilience4j.circuitbreaker.instances.entityService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.entityService.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.programSubsidyService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.programSubsidyService.sliding-window-size=10
resilience4j.circuitbreaker.instances.programSubsidyService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.programSubsidyService.wait-duration-in-open-state=10s


resilience4j.circuitbreaker.instances.taxService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.taxService.sliding-window-size=10
resilience4j.circuitbreaker.instances.taxService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.taxService.wait-duration-in-open-state=10s
