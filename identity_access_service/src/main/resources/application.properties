spring.application.name=identity-access-service
server.port=8081
spring.config.import=optional:configserver:http://localhost:8760

#please do not edit the above section 
#Eureka properties are in the config server repository
#add your database passwords in your current file





# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/identity_micro?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*

# ===============================
# EMAIL CONFIGURATION (GMAIL SMTP)
